apiVersion: v1
kind: ServiceAccount
metadata:
  name: hack-resizer
  namespace: hack-resizer
---
# Read VPA objects cluster-wide (Goldilocks creates them in target namespaces)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hack-resizer-vpa-reader
rules:
  - apiGroups: ["autoscaling.k8s.io"]
    resources: ["verticalpodautoscalers"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hack-resizer-vpa-reader
subjects:
  - kind: ServiceAccount
    name: hack-resizer
    namespace: hack-resizer
roleRef:
  kind: ClusterRole
  name: hack-resizer-vpa-reader
  apiGroup: rbac.authorization.k8s.io
---
# Read + Patch Deployments in prajwal-hack ONLY
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hack-resizer-deployment-patcher
  namespace: prajwal-hack
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hack-resizer-deployment-patcher
  namespace: prajwal-hack
subjects:
  - kind: ServiceAccount
    name: hack-resizer
    namespace: hack-resizer
roleRef:
  kind: Role
  name: hack-resizer-deployment-patcher
  apiGroup: rbac.authorization.k8s.io
---
# Read + Patch Deployments in prajwal-hack-region-1 ONLY
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hack-resizer-deployment-patcher
  namespace: prajwal-hack-region-1
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hack-resizer-deployment-patcher
  namespace: prajwal-hack-region-1
subjects:
  - kind: ServiceAccount
    name: hack-resizer
    namespace: hack-resizer
roleRef:
  kind: Role
  name: hack-resizer-deployment-patcher
  apiGroup: rbac.authorization.k8s.io
